# logging.conf - Central logging configuration for tensorized_minhash.

# Loaded by log_setup.setup_logging() which is called ONCE at application
# startup (main.py and demo entry points). Library modules just do:
# import logging
# logger = logging.getLogger(__name__)
# and never touch basicConfig or fileConfig themselves.

[loggers]
keys=root,py4j,pyspark,urllib3

[handlers]
keys=console

[formatters]
keys=standard

# Root logger
# Default level for all our code (core, data, benchmarks, spark, demo, __main__)
[logger_root]
level=INFO
handlers=console

# Suppress chatty third-party loggers
[logger_py4j]
level=WARNING
handlers=console
qualname=py4j
propagate=0

[logger_pyspark]
level=WARNING
handlers=console
qualname=pyspark
propagate=0

[logger_urllib3]
level=WARNING
handlers=console
qualname=urllib3
propagate=0

# Handler
[handler_console]
class=StreamHandler
level=DEBUG
formatter=standard
args=(sys.stdout,)

# Formatter
[formatter_standard]
format=%(asctime)s %(levelname)-7s %(name)s - %(message)s
datefmt=%H:%M:%S